
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Настройки прокси</title>
  <!-- Встроенные стили для страницы настроек -->
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      width: 320px;
      background: #f3f3f3;
    }
    input, select, button {
      margin: 4px 0;
      padding: 6px;
      width: 100%;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      cursor: pointer;
    }
    ul { list-style: none; padding: 0; }
    .site-item { margin-top: 6px; padding: 6px; background: #fff; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
    .site-item span { font-size: 14px; }
    .popular-item { margin-top: 6px; padding: 6px; background: #fff; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
      margin-right: 10px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0;
      right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px; width: 18px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2196F3;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    .toggle-wrapper {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }
    .add-wrapper {
      display: flex;
      margin-top: 10px;
    }
    .add-wrapper input {
      flex: 1;
      margin-right: 4px;
    }
    .add-wrapper button {
      width: auto;
      padding: 6px 12px;
    }
    .remove-btn {
      background: none;
      color: #999;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      margin-left: auto;
      margin-right: 0;
    }
  </style>
</head>
<body>
  <h3>Настройки прокси</h3>
  <div class="toggle-wrapper">
    <label class="switch">
      <input type="checkbox" id="selectiveModeToggle">
      <span class="slider round"></span>
    </label>
    <span>Избирательный режим</span>
  </div>
  <div id="selectiveSettings" style="display: none;">
    <h4>Добавить сайт</h4>
    <div class="add-wrapper">
      <input id="siteInput" placeholder="Адрес сайта (например, youtube.com)">
      <button id="addSiteBtn">Добавить</button>
    </div>
    <ul id="sitesList"></ul>
    <h4>Популярные сайты</h4>
    <div class="popular-item">
      <span>🔴 YouTube</span>
      <label class="switch">
        <input type="checkbox" id="youtubeToggle">
        <span class="slider round"></span>
      </label>
    </div>
    <div class="popular-item">
      <span>֎ ChatGPT</span>
      <label class="switch">
        <input type="checkbox" id="chatgptToggle">
        <span class="slider round"></span>
      </label>
    </div>
    <div class="popular-item">
      <span>📷 Netflix</span>
      <label class="switch">
        <input type="checkbox" id="netflixToggle">
        <span class="slider round"></span>
      </label>
    </div>
  </div>
  <button id="backBtn">Назад</button>
  <script src="settings.js"></script>
</body>
</html>
